<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Debate Chatbot</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div class="brand-text">
          <div class="title">Debate Chatbot</div>
          <div class="subtitle">Grounded answers from 2019-2020 Democratic debate transcripts</div>
        </div>
      </div>
      <div class="controls">
        <label class="control">
          <span>Top K</span>
          <input id="topk" type="number" min="1" max="50" value="8" />
        </label>
      </div>
    </header>

    <main class="wrap">
      <section class="panel">
        <div id="thread" class="thread" aria-live="polite"></div>
      </section>

      <form id="composer" class="composer" autocomplete="off">
        <div class="composer-inner">
          <textarea
            id="question"
            class="input"
            rows="2"
            placeholder="Ask something like: What did candidates say about Medicare for All?"
          ></textarea>
          <button id="ask" class="btn" type="submit">Ask</button>
        </div>
        <div class="hint">Enter to send. Shift+Enter for a new line.</div>
      </form>
    </main>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
